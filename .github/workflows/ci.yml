name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: frontend # every `run:` step executes inside frontend/

jobs:
  check:
    runs-on: ubuntu-latest
    container:
      image: node:24
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx prettier --check .
      - run: npm run build
